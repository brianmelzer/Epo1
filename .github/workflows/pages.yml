name: Deploy site to GitHub Pages

# Site intentionally taken offline: deploys a blank placeholder over the
# previous public FERVEUR site. To remove Pages entirely, also unpublish
# under repo Settings -> Pages after this deploy runs.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Create blank site
        run: |
          mkdir -p _blank
          echo '<!DOCTYPE html><title>Offline</title><p>This site is no longer available.</p>' > _blank/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _blank

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
